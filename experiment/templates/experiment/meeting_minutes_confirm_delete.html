{% extends 'base.html' %}
{% load static %}

{% block title %}تایید حذف صورت جلسه{% endblock %}

{% block main %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="card-header bg-danger text-white text-center">
          <h6 class="mb-0">
            <i class="bi bi-exclamation-triangle me-2"></i>تایید حذف
          </h6>
        </div>
        <div class="card-body p-4 text-center">
          <p class="lead mb-4">
            آیا از حذف صورت جلسه <strong>{{ minutes.project.name }} — نتیجه {{ minutes.minutes_number }}</strong> مطمئن هستید؟
          </p>
          <p class="text-muted mb-4">
            این عمل قابل بازگشت نیست.
          </p>
          
          <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger rounded-pill px-4">
              <i class="bi bi-trash me-2"></i>حذف
            </button>
            <a href="{% url 'experiment:meeting_minutes_list' %}" class="btn btn-secondary rounded-pill px-4">
              <i class="bi bi-x me-2"></i>انصراف
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
